name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Detect smoke check
        run: interneto-install --detect
      - name: Run tests
        run: python -m pytest -q

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify bundled data is in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          required = [
              "interneto_install/data/icons.json",
              "interneto_install/data/favorites.json",
              "interneto_install/data/desktop-pkgs.json",
          ]
          missing = [n for n in required if n not in names]
          assert not missing, f"missing from wheel: {missing}"
          print("wheel OK:", whl)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
